<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kurumsal Rehber | V2 Güvenli</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
    
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap');
        html { font-size: 18px; } /* %125 büyüklük hissi için */
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; color: #1e293b; overflow: hidden; position: relative; }
        .dev-signature { position: fixed; bottom: 10px; right: 20px; font-size: 10px; font-weight: 800; color: #cbd5e1; letter-spacing: 1px; pointer-events: none; z-index: 100; }
        
        /* Login Ekranı Tasarımı */
        #loginScreen { position: fixed; inset: 0; background: #4f46e5; z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .login-card { background: white; padding: 2.5rem; border-radius: 2rem; width: 100%; max-width: 450px; box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5); text-align: center; }
        
        #mainApp { display: none; height: 100vh; flex-direction: column; }
        #contactsWrapper.grid-mode { display: grid; grid-template-columns: repeat(auto-fill, minmax(320px, 1fr)); gap: 1.5rem; }
        
        /* Kart Tasarımları */
        .card { background: white; border: 1px solid #e2e8f0; border-radius: 1.5rem; transition: all 0.3s; position: relative; padding: 1.5rem; cursor: pointer; height: 100%; min-height: 350px; display: flex; flex-direction: column; justify-content: space-between; }
        .card:hover { transform: translateY(-4px); box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        .info-row { font-size: 13px; font-weight: 600; color: #475569; background: #f8fafc; padding: 8px 12px; border-radius: 10px; margin-top: 6px; display: flex; align-items: center; gap: 10px; }
        .card-not-area { font-size: 12px; color: #64748b; background: #fffbeb; padding: 12px; border-radius: 12px; margin-top: 12px; border: 1px dashed #fcd34d; white-space: pre-wrap; }

        .modal { display: none; position: fixed; inset: 0; background: rgba(15, 23, 42, 0.7); z-index: 1000; align-items: center; justify-content: center; backdrop-filter: blur(8px); }
        .modal.active { display: flex; }
        .modal-content { background: white; width: 100%; max-width: 650px; border-radius: 2rem; padding: 2rem; max-height: 90vh; overflow-y: auto; }
        
        .dropdown-menu { display: none; position: absolute; right: 0; top: 100%; margin-top: 0.75rem; z-index: 2000; min-width: 250px; }
        .dropdown-menu.show { display: block; }
        #toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%) translateY(100px); padding: 12px 24px; border-radius: 12px; color: white; font-weight: 600; transition: 0.4s; z-index: 3000; }
        #toast.active { transform: translateX(-50%) translateY(0); }
    </style>
</head>
<body>

<div class="dev-signature">B.ERDOGAN</div>

<div id="loginScreen">
    <div class="login-card">
        <div class="w-20 h-20 bg-indigo-50 rounded-3xl flex items-center justify-center mx-auto mb-6">
            <i class="fa-solid fa-shield-halved text-4xl text-indigo-600"></i>
        </div>
        <h2 class="text-2xl font-bold text-slate-800">Güvenli Giriş</h2>
        <p class="text-slate-400 text-sm mb-6">Lütfen şifrenizi girin</p>
        <input type="password" id="passInput" placeholder="••••••" class="w-full p-4 bg-slate-100 rounded-xl outline-none mb-4 text-center text-2xl tracking-widest border-2 border-transparent focus:border-indigo-500 transition">
        <button onclick="app.checkPassword()" class="w-full bg-indigo-600 text-white py-4 rounded-xl font-bold hover:bg-indigo-700 transition shadow-lg">Giriş Yap</button>
        <p id="loginError" class="text-red-500 text-xs mt-4 font-bold hidden">Hatalı şifre veya yetkisiz erişim.</p>
    </div>
</div>

<div id="mainApp">
    <div id="toast"></div>

    <header class="bg-white border-b px-8 py-4 shadow-sm">
        <div class="max-w-7xl mx-auto flex items-center justify-between gap-4">
            <div class="flex items-center gap-3">
                <img src="https://www.ilbank.gov.tr/assets/ccc/media/logos/ilbank_logo.svg" class="h-10 w-10">
                <h1 class="font-black text-slate-800 uppercase tracking-tighter">Rehber V2</h1>
            </div>
            
            <div class="flex-1 max-w-lg relative">
                <i class="fa-solid fa-magnifying-glass absolute left-4 top-4 text-slate-400"></i>
                <input type="text" oninput="app.search(this.value)" placeholder="Hızlı ara..." class="w-full pl-12 pr-4 py-3 bg-slate-100 rounded-2xl outline-none focus:ring-2 ring-indigo-500/20 transition">
            </div>

            <div class="flex items-center gap-3">
                <button onclick="app.logout()" class="p-3 text-slate-400 hover:text-red-500 transition"><i class="fa-solid fa-power-off"></i></button>
                <button onclick="app.openModal()" class="bg-indigo-600 text-white px-6 py-3 rounded-2xl font-bold text-sm shadow-indigo-200 shadow-lg hover:bg-indigo-700 transition">+ Yeni Kayıt</button>
            </div>
        </div>
    </header>

    <main class="flex-1 flex overflow-hidden">
        <aside class="w-72 bg-white border-r p-6 overflow-y-auto">
            <div class="flex items-center justify-between mb-6">
                <h3 class="text-xs font-black text-slate-400 uppercase tracking-widest">Kategoriler</h3>
                <button onclick="app.openCategoryModal()" class="text-indigo-600"><i class="fa-solid fa-plus"></i></button>
            </div>
            <div id="catList" class="space-y-1"></div>
        </aside>

        <section class="flex-1 p-8 overflow-y-auto">
            <div class="flex justify-between items-center mb-6">
                <div class="flex items-center gap-4">
                    <span id="statText" class="text-sm font-bold text-slate-400">Yükleniyor...</span>
                    <button id="catDeleteBtn" onclick="app.deleteCurrentCategoryContacts()" class="hidden bg-red-50 text-red-500 px-3 py-1 rounded-lg text-[10px] font-black uppercase tracking-widest">Kategoriyi Temizle</button>
                </div>
                <div class="relative">
                    <button onclick="app.toggleDropdown(event)" class="bg-white border px-4 py-2 rounded-xl text-sm font-bold flex items-center gap-2">Araçlar <i class="fa-solid fa-chevron-down"></i></button>
                    <div id="opsDropdown" class="dropdown-menu bg-white border rounded-2xl shadow-xl p-2">
                        <button onclick="document.getElementById('vcfInput').click()" class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 rounded-xl flex items-center gap-3"><i class="fa-solid fa-address-book text-orange-500"></i> vCard Yükle</button>
                        <button onclick="app.exportVCF()" class="w-full text-left px-4 py-3 text-sm hover:bg-slate-50 rounded-xl flex items-center gap-3"><i class="fa-solid fa-address-card text-indigo-500"></i> vCard İndir</button>
                    </div>
                </div>
            </div>
            <div id="contactsWrapper" class="grid-mode"></div>
        </section>
    </main>
</div>

<input type="file" id="vcfInput" hidden onchange="app.importVCF(event)" accept=".vcf">

<script>
// --- KONFİGÜRASYON ---
const firebaseConfig = { databaseURL: "https://krehber-eb2e9-default-rtdb.europe-west1.firebasedatabase.app" };
const ADMIN_EMAIL = "krehberilbank@gmail.com"; // BURAYI FIREBASE AUTH İLE AYNI YAPIN

firebase.initializeApp(firebaseConfig);
const db = firebase.database();
const auth = firebase.auth();

class BulutRehber {
    constructor() {
        this.contacts = []; this.categories = []; this.currentCategory = 'Tümü';
        this.init();
    }

    init() {
        auth.onAuthStateChanged(user => {
            if (user) this.showApp();
            else document.getElementById('loginScreen').style.display = 'flex';
        });
    }

    checkPassword() {
        const password = document.getElementById('passInput').value;
        auth.signInWithEmailAndPassword(ADMIN_EMAIL, password).catch(() => {
            document.getElementById('loginError').classList.remove('hidden');
        });
    }

    logout() { auth.signOut().then(() => location.reload()); }

    showApp() {
        document.getElementById('loginScreen').style.display = 'none';
        document.getElementById('mainApp').style.display = 'flex';
        this.loadData();
    }

    loadData() {
        db.ref("categories").on("value", s => {
            const d = s.val();
            this.categories = d ? Object.keys(d).map(k => ({id: k, name: d[k]})) : [];
            this.renderCats();
        });
        db.ref("contacts").on("value", s => {
            const d = s.val();
            this.contacts = d ? Object.keys(d).map(k => ({id:k, ...d[k]})) : [];
            this.render();
            document.getElementById('statText').innerText = `${this.contacts.length} Kişi Kayıtlı`;
        });
    }

    // VCARD NOT DÜZELTMESİ (Özel İstek)
    async importVCF(e) {
        const file = e.target.files[0]; if(!file) return;
        const reader = new FileReader();
        reader.onload = async (ev) => {
            const cards = ev.target.result.split("END:VCARD").filter(c => c.includes("BEGIN:VCARD"));
            const batch = {};
            cards.forEach(card => {
                const getV = (k) => {
                    const r = new RegExp(`${k}(?:;.*)?:([\\s\\S]*?)(?=\\r?\\n[A-Z]|$)`, "i");
                    const m = card.match(r);
                    return m ? m[1].replace(/\\n/g, '\n').replace(/\\,/g, ',').trim() : "";
                };
                const nid = db.ref().child('contacts').push().key;
                batch[nid] = {
                    ad: getV("FN").split(' ')[0] || "İsimsiz",
                    soyad: getV("FN").split(' ').slice(1).join(' ') || "",
                    tel1: (card.match(/TEL(?:;.*)?:(.*)/i) || ["",""])[1].replace(/[-() ]/g, '').trim(),
                    notlar: getV("NOTE"),
                    kategori: "Genel"
                };
            });
            await db.ref("contacts").update(batch);
            this.showToast("vCard Aktarıldı", "#10b981");
        }; reader.readAsText(file);
    }

    exportVCF() {
        let vcf = "";
        this.contacts.forEach(c => {
            vcf += `BEGIN:VCARD\nVERSION:3.0\nFN:${c.ad} ${c.soyad}\nTEL;TYPE=CELL:${c.tel1}\nNOTE:${(c.notlar||"").replace(/\n/g, '\\n')}\nEND:VCARD\n`;
        });
        const blob = new Blob([vcf], {type: "text/vcard"});
        const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = "rehber.vcf"; a.click();
    }

    // KATEGORİ SİLME (Özel İstek)
    async deleteCurrentCategoryContacts() {
        if (this.currentCategory === 'Tümü') return;
        const targets = this.contacts.filter(c => c.kategori === this.currentCategory);
        if (confirm(`${this.currentCategory} kategorisindeki ${targets.length} kişi silinsin mi?`)) {
            const up = {}; targets.forEach(t => up[t.id] = null);
            await db.ref("contacts").update(up);
            this.showToast("Kategori Silindi", "#ef4444");
        }
    }

    render() {
        const w = document.getElementById('contactsWrapper'); w.innerHTML = "";
        const data = this.currentCategory === 'Tümü' ? this.contacts : this.contacts.filter(c => c.kategori === this.currentCategory);
        data.forEach(c => {
            const div = document.createElement('div');
            div.className = "card";
            div.innerHTML = `
                <div class="text-center">
                    <div class="w-20 h-20 bg-slate-100 rounded-full mx-auto mb-4 flex items-center justify-center font-bold text-indigo-400 text-xl">${c.ad[0]}</div>
                    <h4 class="font-bold">${c.ad} ${c.soyad}</h4>
                </div>
                <div class="mt-4">
                    <div class="info-row"><i class="fa-solid fa-phone"></i> ${c.tel1 || '-'}</div>
                    ${c.notlar ? `<div class="card-not-area">${c.notlar}</div>` : ''}
                </div>
                <div class="flex justify-between items-center mt-4 pt-4 border-t">
                    <span class="text-[10px] font-bold text-slate-400 uppercase">${c.kategori}</span>
                    <button onclick="app.del('${c.id}')" class="text-red-400"><i class="fa-solid fa-trash"></i></button>
                </div>
            `;
            w.appendChild(div);
        });
        document.getElementById('catDeleteBtn').classList.toggle('hidden', this.currentCategory === 'Tümü');
    }

    renderCats() {
        const l = document.getElementById('catList');
        let html = `<button onclick="app.setCat('Tümü')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold ${this.currentCategory === 'Tümü' ? 'bg-indigo-600 text-white' : 'hover:bg-slate-100'}">Tümü</button>`;
        this.categories.forEach(c => {
            html += `<button onclick="app.setCat('${c.name}')" class="w-full text-left px-4 py-3 rounded-xl text-sm font-bold ${this.currentCategory === c.name ? 'bg-indigo-600 text-white' : 'hover:bg-slate-100'}">${c.name}</button>`;
        });
        l.innerHTML = html;
    }

    setCat(cat) { this.currentCategory = cat; this.render(); this.renderCats(); }
    del(id) { if(confirm("Silinsin mi?")) db.ref("contacts/"+id).remove(); }
    search(q) { 
        const term = q.toLowerCase();
        const f = this.contacts.filter(c => (c.ad + c.soyad + c.tel1).toLowerCase().includes(term));
        this.render(f);
    }
    toggleDropdown(e) { e.stopPropagation(); document.getElementById('opsDropdown').classList.toggle('show'); }
    showToast(m, c) { const t = document.getElementById('toast'); t.style.background = c; t.innerText = m; t.classList.add('active'); setTimeout(()=>t.classList.remove('active'), 2500); }
    openModal() { /* Kayıt modalı açma */ }
}
const app = new BulutRehber();
</script>
</body>

</html>
